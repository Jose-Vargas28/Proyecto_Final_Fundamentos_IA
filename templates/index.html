<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Clasificador MNIST - Web</title>
</head>
<body>
  <h1>Clasificador de imágenes MNIST</h1>
  <form id="uploadForm">
    <input type="file" id="imageInput" accept="image/*" required />
    <button type="submit">Clasificar</button>
  </form>
  <p id="result"></p>

  <script>
    const form = document.getElementById('uploadForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const fileInput = document.getElementById('imageInput');
      if (!fileInput.files.length) {
        alert('Por favor selecciona una imagen');
        return;
      }

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      document.getElementById('result').textContent = 'Clasificando...';

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          body: formData
        });
        const data = await response.json();

        if (response.ok) {
          document.getElementById('result').textContent = `La imagen fue clasificada como: ${data.prediction}`;
        } else {
          document.getElementById('result').textContent = `Error: ${data.error}`;
        }
      } catch (error) {
        document.getElementById('result').textContent = 'Error en la petición.';
      }
    });
  </script>
</body>
</html>
